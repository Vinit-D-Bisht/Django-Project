<!DOCTYPE html>
<html>
<head>
    <title>Simple TO-DO Django Project</title>
<style>
body{
    background:#1e1e2f;
    color:white;
    font-family:Arial,sans-serif;
    margin:0;
}

.container{
    width:600px;
    margin:40px auto;
    background:#2a2a40;
    padding:25px;
    border-radius:10px;
}

h1{
    text-align:center;
}

p{
    text-align:center;
    color:#bdbdbd;
}

input{
    width:75%;
    padding:10px;
    border:none;
    border-radius:5px;
    font-size:16px;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:5px;
    background:#4CAF50;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#45a049;
}

ul{
    list-style:none;
    padding:0;
}

li{
    background:#3a3a55;
    padding:12px;
    margin-top:10px;
    border-radius:5px;
}

a{
    float:right;
    color:#87CEFA;
    margin-left:10px;
    text-decoration:none;
}

a:hover{
    color:white;
}
</style> 
</head>
<body>
	<div class=container>
    <h1>My TO-DO APP</h1>

    <form method="POST">
        {% csrf_token %}
        <input type="text" name="task" placeholder="Enter Task">
        <button type="submit">Add Item</button>
    </form>

    <hr>

    <ul>
{% for t in tasks %}
<li>

    {{ t.title }}

    {% if t.status %}
        <span style="color:lightgreen;">Done</span>
    {% else %}
        <span style="color:orange;">Pending</span>
    {% endif %}

    <a href="/status/{{ t.id }}/">
        {% if t.status %}
            Mark Pending
        {% else %}
            Mark Done
        {% endif %}
    </a>

    <a href="/edit/{{ t.id }}/">Edit</a>
    <a href="/delete/{{ t.id }}/">Delete</a>
</li>
{% endfor %}
</ul>
<h3>Total Tasks: {{ tasks|length }}</h3> 
<a href="/logout/">Logout</a>
</div>
</body>
</html>
