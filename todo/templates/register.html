<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <style>
        body{
            background:#1e1e2f;
            color:white;
            font-family:Arial,sans-serif;
        }

        .container{
            width:400px;
            margin:100px auto;
            background:#2a2a40;
            padding:25px;
            border-radius:10px;
            text-align:center;
        }

        input{
            width:90%;
            padding:10px;
            margin:10px 0;
            border:none;
            border-radius:5px;
        }

        button{
            padding:10px 20px;
            background:#4CAF50;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#45a049;
        }

        a{
            color:#87CEFA;
            text-decoration:none;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>Create Account</h1>

    <form method="POST">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Username" required>

        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Register</button>
    </form>

    <br>

    <a href="/login/">Already have an account? Login</a>

</div>

</body>
</html>
